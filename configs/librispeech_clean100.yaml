experiment:
  name: librispeech_clean100
  output_dir: runs/librispeech_clean100

dataset:
  root: data/LibriSpeech
  val_ratio: 0.05
  seed: 1337
  subset_size: null
  val_subset_size: null
  overfit_mode: false
  overfit_size: 20

audio:
  sample_rate: 16000
  n_fft: 400
  win_length: 400
  hop_length: 160
  n_mels: 80
  time_mask_param: 12
  freq_mask_param: 6

model:
  cnn_channels: [48, 96]
  cnn_time_strides: [2, 2]
  cnn_dropout: 0.15
  lstm_input_size: 320
  lstm_hidden_size: 320
  lstm_layers: 3
  dropout: 0.2

training:
  batch_size: 16
  num_workers: 4
  epochs: 30
  lr: 0.0008
  weight_decay: 0.0001
  grad_clip: 5.0
  amp: true
  log_interval: 50
  val_interval: 1
  save_every_epoch: true
  scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 3
    min_lr: 0.00001

debug:
  print_batch_shapes: true
  print_spectrogram_stats: true
  verify_output_lengths: true
  run_forward_pass: true
  run_backward_pass: true
  print_predictions_before_training: true
  sample_predictions: 3
